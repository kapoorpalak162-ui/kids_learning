name: kids-learning

on:
  push:
    branches:
      - main

jobs:
  palakDeploy:
    runs-on: ubuntu-latest
    steps:
      - name: git library
        uses: actions/checkout@v4
      - name: connection
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{secrets.IP}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.PEM}}

          script: | 
            cd /home/ubuntu/kids_learning
            git pull origin main
            pm2 delete "kids_learning"
            pm2 start "php -S 0.0.0.0:8000" --name "kids_learning"
            pm2 save
          
